version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: vanguard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       vanguard_db
    ports:
      - "5432:5432"
    volumes:
      - vanguard_postgres_data:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vanguard_db"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: vanguard_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Persist data to disk so jobs survive a Redis restart.
    # appendonly yes enables the AOF (Append Only File) persistence mode.
    # This is the correct mode for a job queue — RDB snapshots can lose
    # the last few seconds of enqueued jobs on crash.
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - vanguard_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: vanguard_jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # Mailpit — local SMTP server for development email testing.
  # Access the UI at http://localhost:8025 to see sent emails.
  # Added now so it is ready when the notification job is built in Step 4.3.
  mailpit:
    image: axllent/mailpit:latest
    container_name: vanguard_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP

volumes:
  vanguard_postgres_data:
    driver: local
  vanguard_redis_data:
    driver: local